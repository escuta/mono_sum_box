<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" width="900" height="660" font-family="'Courier New', monospace">

  <!-- Background -->
  <rect width="900" height="660" fill="#f5f0e8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a1a">PASSIVE MONO SUMMING BOX — MTS-202 + EARTH POST</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#555">After SUT — line level — DPDT ON-ON wired as DPST ON-OFF — with turntable earth post</text>
  <line x1="40" y1="62" x2="860" y2="62" stroke="#999" stroke-width="1"/>

  <!-- Enclosure outline -->
  <rect x="30" y="70" width="840" height="340" rx="8" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="46" y="86" font-size="10" fill="#aaa">ENCLOSURE (aluminium — conducts ground)</text>

  <!-- ======== CONNECTIONS FACE (left side) ======== -->
  <text x="90" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">CONNECTIONS FACE</text>
  <text x="90" y="117" text-anchor="middle" font-size="9" fill="#666">(all cables this end)</text>

  <!-- Left Input -->
  <rect x="40" y="125" width="60" height="34" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="70" y="144" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">L IN</text>
  <text x="70" y="156" text-anchor="middle" font-size="10" fill="#2e7d32">RCA</text>

  <!-- Right Input -->
  <rect x="40" y="225" width="60" height="34" rx="4" fill="#ffcdd2" stroke="#c62828" stroke-width="1.5"/>
  <text x="70" y="244" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">R IN</text>
  <text x="70" y="256" text-anchor="middle" font-size="10" fill="#c62828">RCA</text>

  <!-- Left Output -->
  <rect x="40" y="295" width="60" height="34" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="70" y="314" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">L OUT</text>
  <text x="70" y="326" text-anchor="middle" font-size="10" fill="#2e7d32">RCA</text>

  <!-- Right Output -->
  <rect x="40" y="343" width="60" height="34" rx="4" fill="#ffcdd2" stroke="#c62828" stroke-width="1.5"/>
  <text x="70" y="362" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">R OUT</text>
  <text x="70" y="374" text-anchor="middle" font-size="10" fill="#c62828">RCA</text>

  <!-- Earth post -->
  <circle cx="70" cy="172" r="12" fill="#ffd54f" stroke="#f57f17" stroke-width="2"/>
  <text x="70" y="176" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">⏚</text>
  <text x="70" y="194" text-anchor="middle" font-size="9" fill="#555">EARTH</text>
  <text x="70" y="204" text-anchor="middle" font-size="9" fill="#555">POST</text>

  <!-- Earth post connections label -->
  <text x="145" y="168" font-size="9" fill="#777">← TT earth wire</text>
  <text x="145" y="180" font-size="9" fill="#777">← wire to SUT</text>

  <!-- ======== SIGNAL LINES ======== -->
  <!-- Left hot straight through -->
  <line x1="100" y1="142" x2="800" y2="142" stroke="#388e3c" stroke-width="2"/>
  <!-- Right hot straight through -->
  <line x1="100" y1="242" x2="800" y2="242" stroke="#c62828" stroke-width="2"/>

  <!-- Output connections from straight through lines -->
  <circle cx="750" cy="142" r="4" fill="#555"/>
  <circle cx="750" cy="242" r="4" fill="#555"/>
  <line x1="750" y1="142" x2="750" y2="312" stroke="#388e3c" stroke-width="1.5"/>
  <line x1="750" y1="242" x2="740" y2="242" stroke="#c62828" stroke-width="1.5"/>
  <line x1="740" y1="242" x2="740" y2="360" stroke="#c62828" stroke-width="1.5"/>
  <line x1="740" y1="360" x2="100" y2="360" stroke="#c62828" stroke-width="1.5"/>
  <line x1="750" y1="312" x2="100" y2="312" stroke="#388e3c" stroke-width="1.5"/>

  <!-- ======== TAP POINTS ======== -->
  <circle cx="280" cy="142" r="4" fill="#555"/>
  <circle cx="280" cy="242" r="4" fill="#555"/>

  <line x1="280" y1="142" x2="280" y2="187" stroke="#555" stroke-width="1.5"/>
  <line x1="280" y1="242" x2="280" y2="287" stroke="#555" stroke-width="1.5"/>
  <line x1="280" y1="187" x2="350" y2="187" stroke="#555" stroke-width="1.5"/>
  <line x1="280" y1="287" x2="350" y2="287" stroke="#555" stroke-width="1.5"/>

  <!-- ======== MTS-202 SWITCH BODY ======== -->
  <!-- Switch face label on right side -->
  <text x="790" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">SWITCH FACE</text>
  <text x="790" y="117" text-anchor="middle" font-size="9" fill="#666">(opposite end)</text>

  <rect x="350" y="152" width="160" height="178" rx="6" fill="#e8e0d0" stroke="#555" stroke-width="2"/>
  <text x="430" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">MTS-202</text>
  <text x="430" y="183" text-anchor="middle" font-size="10" fill="#555">DPDT ON-ON</text>

  <!-- POLE 1 -->
  <text x="430" y="200" text-anchor="middle" font-size="9" font-weight="bold" fill="#388e3c">POLE 1 — LEFT</text>
  <circle cx="370" cy="212" r="5" fill="#388e3c"/>
  <text x="358" y="226" text-anchor="middle" font-size="8" fill="#333">COM</text>
  <circle cx="410" cy="212" r="5" fill="#f57f17"/>
  <text x="410" y="226" text-anchor="middle" font-size="8" fill="#e65100">T1a</text>
  <text x="410" y="236" text-anchor="middle" font-size="7" fill="#e65100">MONO</text>
  <circle cx="450" cy="212" r="5" fill="#aaa"/>
  <text x="450" y="226" text-anchor="middle" font-size="8" fill="#777">T1b</text>
  <text x="450" y="236" text-anchor="middle" font-size="7" fill="#777">N/C</text>
  <line x1="375" y1="212" x2="405" y2="212" stroke="#f57f17" stroke-width="2"/>

  <!-- POLE 2 -->
  <text x="430" y="258" text-anchor="middle" font-size="9" font-weight="bold" fill="#c62828">POLE 2 — RIGHT</text>
  <circle cx="370" cy="270" r="5" fill="#c62828"/>
  <text x="358" y="284" text-anchor="middle" font-size="8" fill="#333">COM</text>
  <circle cx="410" cy="270" r="5" fill="#f57f17"/>
  <text x="410" y="284" text-anchor="middle" font-size="8" fill="#e65100">T2a</text>
  <text x="410" y="294" text-anchor="middle" font-size="7" fill="#e65100">MONO</text>
  <circle cx="450" cy="270" r="5" fill="#aaa"/>
  <text x="450" y="284" text-anchor="middle" font-size="8" fill="#777">T2b</text>
  <text x="450" y="294" text-anchor="middle" font-size="7" fill="#777">N/C</text>
  <line x1="375" y1="270" x2="405" y2="270" stroke="#f57f17" stroke-width="2"/>

  <line x1="430" y1="217" x2="430" y2="265" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="475" y="244" font-size="9" fill="#555">ganged</text>

  <!-- Lines from throws to resistors -->
  <line x1="415" y1="212" x2="540" y2="212" stroke="#f57f17" stroke-width="1.5"/>
  <line x1="415" y1="270" x2="540" y2="270" stroke="#f57f17" stroke-width="1.5"/>

  <!-- Resistors -->
  <rect x="540" y="200" width="55" height="22" rx="3" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5"/>
  <text x="567" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">10kΩ</text>
  <text x="567" y="196" text-anchor="middle" font-size="9" fill="#777">R1</text>

  <rect x="540" y="258" width="55" height="22" rx="3" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5"/>
  <text x="567" y="273" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">10kΩ</text>
  <text x="567" y="254" text-anchor="middle" font-size="9" fill="#777">R2</text>

  <!-- Summing node -->
  <line x1="595" y1="211" x2="640" y2="211" stroke="#388e3c" stroke-width="1.5"/>
  <line x1="595" y1="269" x2="640" y2="269" stroke="#c62828" stroke-width="1.5"/>
  <line x1="640" y1="211" x2="640" y2="269" stroke="#555" stroke-width="2"/>
  <circle cx="640" cy="240" r="6" fill="#555"/>
  <text x="655" y="236" font-size="10" font-weight="bold" fill="#333">SUM</text>
  <text x="655" y="248" font-size="10" fill="#555">node</text>
  <line x1="640" y1="246" x2="640" y2="390" stroke="#555" stroke-width="1.5"/>
  <circle cx="640" cy="390" r="4" fill="#555"/>

  <!-- ======== GROUND BUS ======== -->
  <!-- Earth post to ground bus -->
  <line x1="70" y1="184" x2="70" y2="390" stroke="#f57f17" stroke-width="2"/>
  <circle cx="70" cy="390" r="4" fill="#f57f17"/>

  <!-- RCA shield grounds -->
  <line x1="100" y1="154" x2="118" y2="154" stroke="#888" stroke-width="1.5"/>
  <line x1="118" y1="154" x2="118" y2="390" stroke="#888" stroke-width="1.5"/>
  <line x1="100" y1="254" x2="125" y2="254" stroke="#888" stroke-width="1.5"/>
  <line x1="125" y1="254" x2="125" y2="390" stroke="#888" stroke-width="1.5"/>
  <line x1="100" y1="324" x2="132" y2="324" stroke="#888" stroke-width="1.5"/>
  <line x1="132" y1="324" x2="132" y2="390" stroke="#888" stroke-width="1.5"/>
  <line x1="100" y1="372" x2="139" y2="372" stroke="#888" stroke-width="1.5"/>
  <line x1="139" y1="372" x2="139" y2="390" stroke="#888" stroke-width="1.5"/>

  <!-- Ground bus line -->
  <line x1="70" y1="390" x2="760" y2="390" stroke="#888" stroke-width="2.5"/>
  <text x="450" y="408" text-anchor="middle" font-size="11" fill="#555">COMMON GROUND BUS — RCA shields + earth post + enclosure + summing node</text>

  <!-- ======== NOTES TABLE ======== -->
  <rect x="40" y="422" width="820" height="220" rx="6" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="442" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">OPERATION &amp; WIRING NOTES</text>

  <rect x="40" y="448" width="820" height="22" fill="#e0e0e0"/>
  <text x="160" y="463" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">POSITION</text>
  <text x="450" y="463" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">SIGNAL PATH</text>
  <text x="720" y="463" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">RESULT</text>

  <rect x="40" y="470" width="820" height="28" fill="#f1f8e9"/>
  <text x="160" y="488" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">POS 1 — STEREO</text>
  <text x="450" y="483" text-anchor="middle" font-size="11" fill="#333">COMs connect to T1b/T2b — unconnected</text>
  <text x="450" y="495" text-anchor="middle" font-size="10" fill="#777">Resistors fully out of circuit, zero crosstalk</text>
  <text x="720" y="488" text-anchor="middle" font-size="11" fill="#555">Clean stereo</text>

  <rect x="40" y="498" width="820" height="28" fill="#ffebee"/>
  <text x="160" y="516" text-anchor="middle" font-size="11" font-weight="bold" fill="#b71c1c">POS 2 — MONO</text>
  <text x="450" y="511" text-anchor="middle" font-size="11" fill="#333">COMs connect to T1a/T2a — through R1/R2 to summing node</text>
  <text x="450" y="523" text-anchor="middle" font-size="10" fill="#777">L+R summed to ground via node</text>
  <text x="720" y="516" text-anchor="middle" font-size="11" fill="#555">Mono sum, 6dB drop</text>

  <rect x="40" y="526" width="820" height="100" fill="#fffde7"/>
  <text x="450" y="544" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">EARTH POST WIRING</text>
  <text x="60" y="562" font-size="10" fill="#444">• Earth post connects to common ground bus inside enclosure</text>
  <text x="60" y="578" font-size="10" fill="#444">• Turntable earth wire connects to post from outside</text>
  <text x="60" y="594" font-size="10" fill="#444">• Second wire runs from same post to SUT ground terminal</text>
  <text x="60" y="610" font-size="10" fill="#444">• Aluminium enclosure itself is part of ground — all RCA shields, earth post and summing node share one common ground</text>

</svg>
