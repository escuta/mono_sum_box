<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" width="1000" height="680" font-family="'Courier New', monospace">

  <!-- Background -->
  <rect width="1000" height="680" fill="#f5f0e8"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a1a">PASSIVE MONO SUMMING BOX — MTS-402 4PDT ON-ON</text>
  <text x="500" y="52" text-anchor="middle" font-size="11" fill="#555">Verified circuit — Pos 1: Stereo (clean passthrough) / Pos 2: Mono (L+R summed to both outputs)</text>
  <line x1="40" y1="62" x2="960" y2="62" stroke="#999" stroke-width="1"/>

  <!-- Enclosure outline -->
  <rect x="25" y="70" width="950" height="390" rx="8" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="41" y="86" font-size="10" fill="#aaa">ENCLOSURE</text>

  <!-- ======== INPUTS ======== -->
  <text x="85" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">INPUTS</text>
  <text x="85" y="118" text-anchor="middle" font-size="10" fill="#666">(from SUT)</text>

  <!-- Left Input -->
  <rect x="35" y="125" width="60" height="34" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="65" y="144" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">L IN</text>
  <text x="65" y="156" text-anchor="middle" font-size="10" fill="#2e7d32">RCA</text>

  <!-- Right Input -->
  <rect x="35" y="235" width="60" height="34" rx="4" fill="#ffcdd2" stroke="#c62828" stroke-width="1.5"/>
  <text x="65" y="254" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">R IN</text>
  <text x="65" y="266" text-anchor="middle" font-size="10" fill="#c62828">RCA</text>

  <!-- Earth Post -->
  <circle cx="65" cy="340" r="14" fill="#ffd54f" stroke="#f57f17" stroke-width="2"/>
  <text x="65" y="344" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">⏚</text>
  <text x="65" y="362" text-anchor="middle" font-size="9" fill="#555">EARTH</text>

  <!-- ======== INPUT HOT LINES ======== -->
  <!-- L in hot to C1 -->
  <line x1="95" y1="142" x2="310" y2="142" stroke="#388e3c" stroke-width="2"/>
  <!-- R in hot to C2 -->
  <line x1="95" y1="252" x2="310" y2="252" stroke="#c62828" stroke-width="2"/>

  <!-- ======== MTS-402 SWITCH BODY ======== -->
  <rect x="310" y="95" width="300" height="310" rx="8" fill="#e8e0d0" stroke="#555" stroke-width="2"/>
  <text x="460" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">MTS-402</text>
  <text x="460" y="130" text-anchor="middle" font-size="11" fill="#555">4PDT ON-ON — 12 pins</text>

  <!-- Pin layout diagram -->
  <text x="460" y="150" text-anchor="middle" font-size="9" fill="#777">[ T1b  T2b  T3b  T4b ]  ← pos 2 (mono)</text>
  <text x="460" y="163" text-anchor="middle" font-size="9" fill="#333">[ C1    C2    C3    C4  ]  ← commons</text>
  <text x="460" y="176" text-anchor="middle" font-size="9" fill="#777">[ T1a  T2a  T3a  T4a ]  ← pos 1 (stereo)</text>

  <!-- Pole labels -->
  <text x="340" y="200" font-size="9" font-weight="bold" fill="#388e3c">POLE 1</text>
  <text x="340" y="211" font-size="8" fill="#333">L in routing</text>
  <text x="390" y="200" font-size="9" font-weight="bold" fill="#c62828">POLE 2</text>
  <text x="390" y="211" font-size="8" fill="#333">R in routing</text>
  <text x="440" y="200" font-size="9" font-weight="bold" fill="#388e3c">POLE 3</text>
  <text x="440" y="211" font-size="8" fill="#333">L out routing</text>
  <text x="495" y="200" font-size="9" font-weight="bold" fill="#c62828">POLE 4</text>
  <text x="495" y="211" font-size="8" fill="#333">R out routing</text>

  <!-- Switch pin circles — Commons row -->
  <circle cx="350" cy="252" r="6" fill="#388e3c" stroke="#1b5e20" stroke-width="1"/>
  <text x="350" y="270" text-anchor="middle" font-size="8" fill="#333">C1</text>
  <circle cx="400" cy="252" r="6" fill="#c62828" stroke="#b71c1c" stroke-width="1"/>
  <text x="400" y="270" text-anchor="middle" font-size="8" fill="#333">C2</text>
  <circle cx="450" cy="252" r="6" fill="#388e3c" stroke="#1b5e20" stroke-width="1"/>
  <text x="450" y="270" text-anchor="middle" font-size="8" fill="#333">C3</text>
  <circle cx="500" cy="252" r="6" fill="#c62828" stroke="#b71c1c" stroke-width="1"/>
  <text x="500" y="270" text-anchor="middle" font-size="8" fill="#333">C4</text>

  <!-- Switch pin circles — T-a row (stereo pos 1) -->
  <circle cx="350" cy="300" r="6" fill="#aaa" stroke="#888" stroke-width="1"/>
  <text x="350" y="318" text-anchor="middle" font-size="8" fill="#388e3c">T1a</text>
  <text x="350" y="328" text-anchor="middle" font-size="7" fill="#388e3c">L out</text>
  <circle cx="400" cy="300" r="6" fill="#aaa" stroke="#888" stroke-width="1"/>
  <text x="400" y="318" text-anchor="middle" font-size="8" fill="#c62828">T2a</text>
  <text x="400" y="328" text-anchor="middle" font-size="7" fill="#c62828">R out</text>
  <circle cx="450" cy="300" r="6" fill="#aaa" stroke="#888" stroke-width="1"/>
  <text x="450" y="318" text-anchor="middle" font-size="8" fill="#388e3c">T3a</text>
  <text x="450" y="328" text-anchor="middle" font-size="7" fill="#388e3c">L in</text>
  <circle cx="500" cy="300" r="6" fill="#aaa" stroke="#888" stroke-width="1"/>
  <text x="500" y="318" text-anchor="middle" font-size="8" fill="#c62828">T4a</text>
  <text x="500" y="328" text-anchor="middle" font-size="7" fill="#c62828">R in</text>

  <!-- Switch pin circles — T-b row (mono pos 2) -->
  <circle cx="350" cy="215" r="6" fill="#f57f17" stroke="#e65100" stroke-width="1"/>
  <text x="350" y="207" text-anchor="middle" font-size="8" fill="#e65100">T1b</text>
  <text x="350" y="198" text-anchor="middle" font-size="7" fill="#e65100">→R1</text>
  <circle cx="400" cy="215" r="6" fill="#f57f17" stroke="#e65100" stroke-width="1"/>
  <text x="400" y="207" text-anchor="middle" font-size="8" fill="#e65100">T2b</text>
  <text x="400" y="198" text-anchor="middle" font-size="7" fill="#e65100">→R2</text>
  <circle cx="450" cy="215" r="6" fill="#f57f17" stroke="#e65100" stroke-width="1"/>
  <text x="450" y="207" text-anchor="middle" font-size="8" fill="#e65100">T3b</text>
  <text x="450" y="198" text-anchor="middle" font-size="7" fill="#e65100">→SUM</text>
  <circle cx="500" cy="215" r="6" fill="#f57f17" stroke="#e65100" stroke-width="1"/>
  <text x="500" y="207" text-anchor="middle" font-size="8" fill="#e65100">T4b</text>
  <text x="500" y="198" text-anchor="middle" font-size="7" fill="#e65100">→SUM</text>

  <!-- ======== STEREO PATH — T-a connections ======== -->
  <!-- C1 to T1a (L in → L out in stereo) -->
  <line x1="350" y1="258" x2="350" y2="294" stroke="#388e3c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- C2 to T2a (R in → R out in stereo) -->
  <line x1="400" y1="258" x2="400" y2="294" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- C3 to T3a (L out → L in in stereo) -->
  <line x1="450" y1="258" x2="450" y2="294" stroke="#388e3c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- C4 to T4a (R out → R in in stereo) -->
  <line x1="500" y1="258" x2="500" y2="294" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- T1a → L output -->
  <line x1="350" y1="300" x2="350" y2="360" stroke="#388e3c" stroke-width="1.5"/>
  <line x1="350" y1="360" x2="640" y2="360" stroke="#388e3c" stroke-width="1.5"/>
  <line x1="640" y1="360" x2="640" y2="142" stroke="#388e3c" stroke-width="1.5"/>
  <line x1="640" y1="142" x2="870" y2="142" stroke="#388e3c" stroke-width="2"/>

  <!-- T2a → R output -->
  <line x1="400" y1="300" x2="400" y2="370" stroke="#c62828" stroke-width="1.5"/>
  <line x1="400" y1="370" x2="650" y2="370" stroke="#c62828" stroke-width="1.5"/>
  <line x1="650" y1="370" x2="650" y2="252" stroke="#c62828" stroke-width="1.5"/>
  <line x1="650" y1="252" x2="870" y2="252" stroke="#c62828" stroke-width="2"/>

  <!-- T3a → L input (junction) -->
  <line x1="450" y1="300" x2="450" y2="380" stroke="#388e3c" stroke-width="1.5"/>
  <line x1="450" y1="380" x2="200" y2="380" stroke="#388e3c" stroke-width="1.5"/>
  <line x1="200" y1="380" x2="200" y2="142" stroke="#388e3c" stroke-width="1.5"/>
  <circle cx="200" cy="142" r="4" fill="#388e3c"/>

  <!-- T4a → R input (junction) -->
  <line x1="500" y1="300" x2="500" y2="390" stroke="#c62828" stroke-width="1.5"/>
  <line x1="500" y1="390" x2="210" y2="390" stroke="#c62828" stroke-width="1.5"/>
  <line x1="210" y1="390" x2="210" y2="252" stroke="#c62828" stroke-width="1.5"/>
  <circle cx="210" cy="252" r="4" fill="#c62828"/>

  <!-- ======== MONO PATH — T-b connections ======== -->
  <!-- C1 to T1b -->
  <line x1="350" y1="246" x2="350" y2="221" stroke="#388e3c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- C2 to T2b -->
  <line x1="400" y1="246" x2="400" y2="221" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- C3 to T3b -->
  <line x1="450" y1="246" x2="450" y2="221" stroke="#388e3c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- C4 to T4b -->
  <line x1="500" y1="246" x2="500" y2="221" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- T1b → R1 → summing node -->
  <line x1="350" y1="209" x2="350" y2="142" stroke="#f57f17" stroke-width="1.5"/>
  <line x1="350" y1="142" x2="560" y2="142" stroke="#f57f17" stroke-width="1.5"/>
  <!-- R1 resistor -->
  <rect x="560" y="130" width="50" height="22" rx="3" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5"/>
  <text x="585" y="145" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">10kΩ</text>
  <text x="585" y="126" text-anchor="middle" font-size="9" fill="#777">R1</text>
  <line x1="610" y1="141" x2="660" y2="141" stroke="#f57f17" stroke-width="1.5"/>

  <!-- T2b → R2 → summing node -->
  <line x1="400" y1="209" x2="400" y2="165" stroke="#f57f17" stroke-width="1.5"/>
  <line x1="400" y1="165" x2="560" y2="165" stroke="#f57f17" stroke-width="1.5"/>
  <!-- R2 resistor -->
  <rect x="560" y="153" width="50" height="22" rx="3" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5"/>
  <text x="585" y="168" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">10kΩ</text>
  <text x="585" y="149" text-anchor="middle" font-size="9" fill="#777">R2</text>
  <line x1="610" y1="164" x2="660" y2="164" stroke="#f57f17" stroke-width="1.5"/>

  <!-- Summing node -->
  <line x1="660" y1="141" x2="660" y2="164" stroke="#555" stroke-width="2"/>
  <circle cx="660" cy="152" r="7" fill="#555"/>
  <text x="675" y="148" font-size="10" font-weight="bold" fill="#333">SUM</text>
  <text x="675" y="160" font-size="9" fill="#555">node</text>

  <!-- R3 to ground -->
  <line x1="660" y1="159" x2="660" y2="185" stroke="#555" stroke-width="1.5"/>
  <rect x="635" y="185" width="50" height="22" rx="3" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5"/>
  <text x="660" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">20kΩ</text>
  <text x="700" y="196" font-size="9" fill="#777">R3</text>
  <line x1="660" y1="207" x2="660" y2="460" stroke="#555" stroke-width="1.5"/>
  <circle cx="660" cy="460" r="4" fill="#555"/>

  <!-- T3b and T4b to summing node -->
  <line x1="450" y1="209" x2="450" y2="152" stroke="#f57f17" stroke-width="1.5"/>
  <circle cx="450" cy="152" r="3" fill="#f57f17"/>
  <line x1="450" y1="152" x2="653" y2="152" stroke="#f57f17" stroke-width="1.5"/>
  <line x1="500" y1="209" x2="500" y2="152" stroke="#f57f17" stroke-width="1.5"/>
  <circle cx="500" cy="152" r="3" fill="#f57f17"/>

  <!-- ======== OUTPUTS ======== -->
  <text x="915" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">OUTPUTS</text>
  <text x="915" y="118" text-anchor="middle" font-size="10" fill="#666">(to phono stage)</text>

  <!-- Left Output -->
  <rect x="870" y="125" width="60" height="34" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="900" y="144" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">L OUT</text>
  <text x="900" y="156" text-anchor="middle" font-size="10" fill="#2e7d32">RCA</text>

  <!-- Right Output -->
  <rect x="870" y="235" width="60" height="34" rx="4" fill="#ffcdd2" stroke="#c62828" stroke-width="1.5"/>
  <text x="900" y="254" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">R OUT</text>
  <text x="900" y="266" text-anchor="middle" font-size="10" fill="#c62828">RCA</text>

  <!-- Junction dots on output lines -->
  <circle cx="640" cy="142" r="4" fill="#388e3c"/>
  <circle cx="650" cy="252" r="4" fill="#c62828"/>

  <!-- C3 and C4 connect to output lines -->
  <line x1="450" y1="258" x2="450" y2="252" stroke="#388e3c" stroke-width="1.5"/>
  <line x1="450" y1="252" x2="640" y2="252" stroke="#388e3c" stroke-width="1.5"/>
  <line x1="640" y1="252" x2="640" y2="142" stroke="#388e3c" stroke-width="0.5" stroke-dasharray="2,2"/>

  <line x1="500" y1="258" x2="500" y2="342" stroke="#c62828" stroke-width="1.5"/>
  <line x1="500" y1="342" x2="645" y2="342" stroke="#c62828" stroke-width="1.5"/>
  <line x1="645" y1="342" x2="645" y2="252" stroke="#c62828" stroke-width="1.5"/>
  <circle cx="645" cy="252" r="3" fill="#c62828"/>

  <!-- ======== GROUNDS ======== -->
  <!-- Input grounds -->
  <line x1="95" y1="154" x2="115" y2="154" stroke="#888" stroke-width="1.5"/>
  <line x1="115" y1="154" x2="115" y2="460" stroke="#888" stroke-width="1.5"/>
  <line x1="95" y1="264" x2="125" y2="264" stroke="#888" stroke-width="1.5"/>
  <line x1="125" y1="264" x2="125" y2="460" stroke="#888" stroke-width="1.5"/>
  <!-- Output grounds -->
  <line x1="870" y1="154" x2="840" y2="154" stroke="#888" stroke-width="1.5"/>
  <line x1="840" y1="154" x2="840" y2="460" stroke="#888" stroke-width="1.5"/>
  <line x1="870" y1="264" x2="830" y2="264" stroke="#888" stroke-width="1.5"/>
  <line x1="830" y1="264" x2="830" y2="460" stroke="#888" stroke-width="1.5"/>
  <!-- Earth post to ground -->
  <line x1="65" y1="354" x2="65" y2="460" stroke="#f57f17" stroke-width="2"/>
  <circle cx="65" cy="460" r="4" fill="#f57f17"/>
  <!-- Ground bus -->
  <line x1="65" y1="460" x2="840" y2="460" stroke="#888" stroke-width="2.5"/>
  <text x="450" y="478" text-anchor="middle" font-size="11" fill="#555">COMMON GROUND BUS — RCA shields + earth post + R3 summing node</text>

  <!-- ======== POSITION TABLE ======== -->
  <rect x="40" y="492" width="920" height="175" rx="6" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="500" y="512" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">SWITCH OPERATION</text>

  <rect x="40" y="518" width="920" height="22" fill="#e0e0e0"/>
  <text x="140" y="533" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">POSITION</text>
  <text x="430" y="533" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">SWITCH CONNECTIONS</text>
  <text x="780" y="533" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">RESULT</text>

  <rect x="40" y="540" width="920" height="50" fill="#f1f8e9"/>
  <text x="140" y="558" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">POS 1 — STEREO</text>
  <text x="430" y="553" text-anchor="middle" font-size="10" fill="#333">C1→T1a: L in → L out directly</text>
  <text x="430" y="565" text-anchor="middle" font-size="10" fill="#333">C2→T2a: R in → R out directly</text>
  <text x="430" y="577" text-anchor="middle" font-size="10" fill="#333">C3→T3a / C4→T4a: outputs tied back to inputs</text>
  <text x="780" y="558" text-anchor="middle" font-size="10" fill="#555">Clean stereo passthrough</text>
  <text x="780" y="570" text-anchor="middle" font-size="10" fill="#555">Summing network completely</text>
  <text x="780" y="582" text-anchor="middle" font-size="10" fill="#555">disconnected. Zero crosstalk.</text>

  <rect x="40" y="590" width="920" height="50" fill="#ffebee"/>
  <text x="140" y="608" text-anchor="middle" font-size="11" font-weight="bold" fill="#b71c1c">POS 2 — MONO</text>
  <text x="430" y="603" text-anchor="middle" font-size="10" fill="#333">C1→T1b: L in → R1 → summing node</text>
  <text x="430" y="615" text-anchor="middle" font-size="10" fill="#333">C2→T2b: R in → R2 → summing node</text>
  <text x="430" y="627" text-anchor="middle" font-size="10" fill="#333">C3→T3b / C4→T4b: both outputs ← summing node</text>
  <text x="780" y="608" text-anchor="middle" font-size="10" fill="#555">L+R summed via R1/R2</text>
  <text x="780" y="620" text-anchor="middle" font-size="10" fill="#555">R3 (20kΩ) to ground at node</text>
  <text x="780" y="632" text-anchor="middle" font-size="10" fill="#555">Both outputs carry mono signal</text>

  <text x="500" y="658" text-anchor="middle" font-size="10" fill="#777">Components: 4× RCA sockets, R1/R2 10kΩ 1%, R3 20kΩ, MTS-402 4PDT ON-ON (12 pins), earth post, aluminium enclosure 100×56×56mm</text>

</svg>
